services:
  ai-worker-ollama:
    build: .
    profiles:
      - ai
    depends_on:
      coordinator:
        condition: service_healthy
    environment:
      PICOIN_FORGE_TEST_AI_MODEL_BACKEND: "${PICOIN_FORGE_TEST_AI_MODEL_BACKEND:-}"
      PICOIN_FORGE_AI_MODEL_PROVIDER: "${PICOIN_FORGE_AI_MODEL_PROVIDER:-ollama}"
      PICOIN_FORGE_AI_MODEL_NAME: "${PICOIN_FORGE_AI_MODEL_NAME:-llama3.1:8b}"
      PICOIN_FORGE_AI_MODEL_PARAMETERS_B: "${PICOIN_FORGE_AI_MODEL_PARAMETERS_B:-8}"
      PICOIN_FORGE_AI_MODEL_CONTEXT_TOKENS: "${PICOIN_FORGE_AI_MODEL_CONTEXT_TOKENS:-8192}"
      PICOIN_FORGE_AI_MODEL_QUANTIZATION: "${PICOIN_FORGE_AI_MODEL_QUANTIZATION:-q4_k_m}"
      PICOIN_FORGE_AI_MODEL_CAPABILITIES: "${PICOIN_FORGE_AI_MODEL_CAPABILITIES:-llm,chat,reasoning}"
      PICOIN_FORGE_AI_MODEL_ENDPOINT: "${PICOIN_FORGE_AI_MODEL_ENDPOINT:-http://host.docker.internal:11434}"
      PICOIN_FORGE_AI_MODEL_TIMEOUT_SECONDS: "${PICOIN_FORGE_AI_MODEL_TIMEOUT_SECONDS:-30}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: >
      sh -lc "picoin-forge-worker ai-smoke
      && picoin-forge-worker register --wallet ${PICOIN_FORGE_AI_WORKER_WALLET:-PIDOCKERAIWORKER0001} --coordinator-url http://coordinator:9380
      && picoin-forge-worker loop --coordinator-url http://coordinator:9380 --interval-seconds ${PICOIN_FORGE_AI_WORKER_INTERVAL_SECONDS:-20} --challenge-type ai_model"
    volumes:
      - forge_l2_ai_worker_ollama:/app/.picoin-forge-worker
    healthcheck:
      test: ["CMD-SHELL", "test -f /app/.picoin-forge-worker/worker.json && test -f /app/.picoin-forge-worker/config.json"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  forge_l2_ai_worker_ollama:
