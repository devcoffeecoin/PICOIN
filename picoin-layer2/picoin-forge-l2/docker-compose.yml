services:
  coordinator:
    build: .
    command: picoin-forge-coordinator start --host 0.0.0.0 --port 9380
    environment:
      PICOIN_FORGE_CHALLENGE_EXPIRER_SECONDS: "30"
    ports:
      - "9380:9380"
    volumes:
      - forge_l2_coordinator:/app/.picoin-forge-l2
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9380/health', timeout=5).read()"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  worker-1:
    build: .
    depends_on:
      coordinator:
        condition: service_healthy
    command: >
      sh -lc "picoin-forge-worker register --wallet PIDOCKERWORKER0001 --coordinator-url http://coordinator:9380
      && picoin-forge-worker loop --coordinator-url http://coordinator:9380 --interval-seconds 20"
    volumes:
      - forge_l2_worker_1:/app/.picoin-forge-worker
    healthcheck:
      test: ["CMD-SHELL", "test -f /app/.picoin-forge-worker/worker.json && test -f /app/.picoin-forge-worker/config.json"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 20s

  worker-2:
    build: .
    depends_on:
      coordinator:
        condition: service_healthy
    command: >
      sh -lc "picoin-forge-worker register --wallet PIDOCKERWORKER0002 --coordinator-url http://coordinator:9380
      && picoin-forge-worker loop --coordinator-url http://coordinator:9380 --interval-seconds 20"
    volumes:
      - forge_l2_worker_2:/app/.picoin-forge-worker
    healthcheck:
      test: ["CMD-SHELL", "test -f /app/.picoin-forge-worker/worker.json && test -f /app/.picoin-forge-worker/config.json"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 20s

  worker-3:
    build: .
    depends_on:
      coordinator:
        condition: service_healthy
    command: >
      sh -lc "picoin-forge-worker register --wallet PIDOCKERWORKER0003 --coordinator-url http://coordinator:9380
      && picoin-forge-worker loop --coordinator-url http://coordinator:9380 --interval-seconds 20"
    volumes:
      - forge_l2_worker_3:/app/.picoin-forge-worker
    healthcheck:
      test: ["CMD-SHELL", "test -f /app/.picoin-forge-worker/worker.json && test -f /app/.picoin-forge-worker/config.json"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  forge_l2_coordinator:
  forge_l2_worker_1:
  forge_l2_worker_2:
  forge_l2_worker_3:
