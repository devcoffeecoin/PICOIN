services:
  bootstrap:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - .:/app
      - bootstrap-data:/app/data
    environment:
      PICOIN_NETWORK: distributed-testnet
      PICOIN_CHAIN_ID: picoin-distributed-testnet-v017
      PICOIN_NODE_ID: bootstrap-1
      PICOIN_NODE_TYPE: bootstrap
      PICOIN_NODE_ADDRESS: http://bootstrap:8000
      PICOIN_PORT: 8000
    command: sh -c "pip install -r requirements.txt && python -m picoin node start --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"

  miner-one:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - .:/app
      - miner-one-data:/app/data
    environment:
      PICOIN_NETWORK: distributed-testnet
      PICOIN_CHAIN_ID: picoin-distributed-testnet-v017
      PICOIN_NODE_ID: miner-1
      PICOIN_NODE_TYPE: miner
      PICOIN_NODE_ADDRESS: http://miner-one:8000
      PICOIN_BOOTSTRAP_PEERS: http://bootstrap:8000
    command: sh -c "pip install -r requirements.txt && python -m picoin node start --host 0.0.0.0 --port 8000"
    depends_on:
      - bootstrap

